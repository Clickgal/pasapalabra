<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pasapalabra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --azul-claro: #5FB3F6;
    --azul-medio: #2E7FE0;
    --azul-oscuro: #123E8C;
    --azul-profundo: #0B2C66;
    --azul-celda: #2E74DA;
    --azul-celda-borde: rgba(255,255,255,0.45);
    --azul-pasada: #BFE0FF;
    --blanco: #FFFFFF;
    --blanco-tenue: rgba(255,255,255,0.78);
    --verde-activa: #3CC583;
    --verde-correcta: #2FAF6E;
    --rojo-incorrecta: #E5504A;
    --gris-neutro: #7C93B8;
    --fuente-display: "Baloo 2", sans-serif;
    --fuente-cuerpo: "Space Grotesk", sans-serif;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(circle at 50% 0%, var(--azul-claro) 0%, var(--azul-medio) 45%, var(--azul-oscuro) 100%);
    color: var(--blanco);
    font-family: var(--fuente-cuerpo);
  }

  .escenario{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 20px 18px 40px;
    display: flex;
    flex-direction: column;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 14px;
  }

  h1{
    font-family: var(--fuente-display);
    font-weight: 800;
    font-size: 26px;
    margin:0;
    letter-spacing: 0.3px;
    color: var(--blanco);
  }

  .marcador{
    display:flex; gap:10px;
    font-size: 13px;
    font-weight: 700;
  }
  .marcador span{
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .marcador .aciertos{ color: #DFFFEE; }
  .marcador .fallos{ color: #FFE1DE; }

  .timer-bar-wrap{
    height: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.22);
    overflow:hidden;
    margin-bottom: 6px;
  }
  .timer-bar{
    height:100%;
    width:100%;
    background: var(--blanco);
    transition: width 1s linear, background-color 0.4s ease;
  }
  .timer-texto{
    text-align:center;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 13px;
    color: var(--blanco-tenue);
    margin-bottom: 18px;
  }

  .pantalla{ flex:1; display:flex; flex-direction:column; }
  .oculto{ display:none !important; }

  #pantallaInicio{
    align-items:center;
    justify-content:center;
    text-align:center;
    gap: 26px;
    padding: 10px 6px 40px;
  }
  #pantallaInicio p{
    color: var(--blanco-tenue);
    font-size: 15px;
    line-height: 1.5;
    max-width: 300px;
    margin: 0;
  }

  .boton-redondo{
    font-family: var(--fuente-display);
    font-weight: 700;
    font-size: 19px;
    width: 148px;
    height: 148px;
    border-radius: 50%;
    border: none;
    background: var(--blanco);
    color: var(--azul-oscuro);
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    box-shadow: 0 14px 30px -8px rgba(11,44,102,0.55);
  }
  .boton-redondo:active{ transform: scale(0.96); }

  /* ---- ROSCO ---- */
  .rosco{
    position: relative;
    width: min(92vw, 400px);
    aspect-ratio: 1;
    margin: 6px auto 22px;
    border-radius: 50%;
  }
  .rosco::before{
    content:'';
    position:absolute;
    inset: -6%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.18) 55deg, transparent 130deg, transparent 360deg);
    animation: girar-foco 14s linear infinite;
    z-index: 0;
  }
  @keyframes girar-foco{ to{ transform: rotate(360deg); } }

  .centro-juego{
    position:absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: min(70%, 290px);
    text-align:center;
    z-index: 2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 10px;
  }
  .badge-tipo{
    background: var(--blanco);
    color: var(--azul-oscuro);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 999px;
  }
  .pregunta-texto{
    margin:0;
    font-size: clamp(13px, 3.6vw, 16px);
    font-weight: 700;
    line-height: 1.35;
    color: var(--blanco);
  }

  .input-respuesta{
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.55);
    color: var(--blanco);
    font-family: var(--fuente-cuerpo);
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    padding: 6px 4px;
    outline: none;
  }
  .input-respuesta::placeholder{ color: rgba(255,255,255,0.6); }
  .input-respuesta:disabled{ opacity: 0.7; }

  .respuesta-texto{
    margin:0;
    font-size: 13px;
    font-weight: 700;
    color: var(--azul-oscuro);
    background: rgba(255,255,255,0.94);
    border-radius: 10px;
    padding: 7px 10px;
  }
  .respuesta-texto.es-fallo{ background: rgba(255,255,255,0.94); color: var(--rojo-incorrecta); }
  .respuesta-texto.es-acierto{ background: rgba(255,255,255,0.94); color: var(--verde-correcta); }

  .contador-mini{
    font-size: 11px;
    color: var(--blanco-tenue);
    letter-spacing: 0.4px;
  }

  .botones-icono{
    display:flex; gap: 16px;
    align-items:center;
    justify-content:center;
  }
  .boton-icono{
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: var(--azul-oscuro);
    color: var(--blanco);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 14px -4px rgba(11,44,102,0.6);
  }
  .boton-icono:active{ transform: scale(0.94); }
  .boton-icono:disabled{ opacity: 0.5; }

  .celda{
    position:absolute;
    width: 11%;
    aspect-ratio: 1;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-weight: 700;
    font-size: 12.5px;
    background: var(--azul-celda);
    color: var(--blanco);
    border: 1.5px solid var(--azul-celda-borde);
    z-index: 1;
    transition: all 0.35s ease;
  }
  .celda.activa{
    background: var(--verde-activa);
    color: var(--blanco);
    border-color: var(--verde-activa);
    transform: translate(-50%,-50%) scale(1.28);
    box-shadow: 0 0 0 6px rgba(60,197,131,0.25);
  }
  .celda.correcta{ background: var(--verde-correcta); color:#fff; border-color: var(--verde-correcta); }
  .celda.incorrecta{ background: var(--rojo-incorrecta); color:#fff; border-color: var(--rojo-incorrecta); }
  .celda.pasada{ background: var(--azul-pasada); color: var(--azul-oscuro); border-style: dashed; border-color: var(--blanco); }
  .celda.sin-responder{ background: rgba(255,255,255,0.14); color: var(--blanco-tenue); border-color: rgba(255,255,255,0.3); }

  .flash-correcta .centro-juego{ animation: destello-verde 0.5s ease; }
  .flash-incorrecta .centro-juego{ animation: destello-rojo 0.5s ease; }
  @keyframes destello-verde{ 0%{ filter: drop-shadow(0 0 14px rgba(60,197,131,0.9)); } 100%{ filter: none; } }
  @keyframes destello-rojo{ 0%{ filter: drop-shadow(0 0 14px rgba(229,80,74,0.9)); } 100%{ filter: none; } }

  /* ---- FIN ---- */
  #pantallaFin{
    align-items:center;
    text-align:center;
    justify-content:center;
    gap: 14px;
  }
  #finTitulo{
    font-family: var(--fuente-display);
    font-weight: 800;
    font-size: 28px;
    margin: 0;
    color: var(--blanco);
  }
  #finResumen{
    color: var(--blanco-tenue);
    font-size: 15px;
    margin: 0 0 6px;
  }
  .rosco-final{
    position: relative;
    width: min(72vw, 300px);
    aspect-ratio: 1;
    margin: 4px auto 18px;
  }
  .rosco-final .celda{ cursor:default; }

  @media (prefers-reduced-motion: reduce){
    .rosco::before{ animation: none; }
  }
</style>
</head>
<body>
<div class="escenario">

  <header>
    <h1>Pasapalabra</h1>
    <div class="marcador">
      <span class="aciertos" id="marcadorAciertos">✓ 0</span>
      <span class="fallos" id="marcadorFallos">✗ 0</span>
    </div>
  </header>

  <div class="timer-bar-wrap"><div class="timer-bar" id="barraTiempo"></div></div>
  <div class="timer-texto" id="textoTiempo">02:30</div>

  <div class="pantalla" id="pantallaInicio">
    <p>25 letras, una pregunta por cada una y dos minutos y medio en el reloj. Escribe tu respuesta y compruébala al momento, o pasa a la siguiente si dudas.</p>
    <button class="boton-redondo" id="btnJugar">Comenzar</button>
  </div>

  <div class="pantalla oculto" id="pantallaJuego">
    <div class="rosco" id="rosco">
      <div class="centro-juego" id="centroJuego">
        <div class="badge-tipo" id="preguntaTipo">Empieza por A</div>
        <p class="pregunta-texto" id="preguntaTexto"></p>

        <input type="text" class="input-respuesta" id="inputRespuesta" placeholder="Escribe aquí tu respuesta" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

        <p class="respuesta-texto oculto" id="respuestaTexto"></p>

        <div class="botones-icono" id="botonesIcono">
          <button class="boton-icono" id="btnComprobar" title="Comprobar">✓</button>
          <button class="boton-icono" id="btnPasa" title="Pasapalabra">»</button>
        </div>

        <div class="contador-mini" id="contadorMini">Quedan 25 de 25</div>
      </div>
    </div>
  </div>

  <div class="pantalla oculto" id="pantallaFin">
    <h2 id="finTitulo"></h2>
    <p id="finResumen"></p>
    <div class="rosco-final" id="roscoFinal"></div>
    <button class="boton-redondo" id="btnReiniciar">Otra vez</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  var CONFIG = {
    DURACION_SEGUNDOS: 150,
    RADIO_PORCENTAJE: 43,
    TAMANO_CELDA_PORCENTAJE: 11,
    UMBRAL_TIEMPO_URGENTE: 20,
    RETARDO_TRANSICION_MS: 1000,
    LETRAS_ROSCO: ["A","B","C","D","E","F","G","H","I","J","L","M","N","Ñ","O","P","Q","R","S","T","U","V","X","Y","Z"]
  };

  var BANCO_PREGUNTAS = {
    A: [
      { tipo: "Empieza por A", texto: "Ave rapaz, símbolo de Estados Unidos y de la libertad.", respuesta: "Águila" },
      { tipo: "Empieza por A", texto: "Instrumento musical de cuerda, de forma triangular.", respuesta: "Arpa" }
    ],
    B: [
      { tipo: "Empieza por B", texto: "Mamífero marino, el animal más grande que existe.", respuesta: "Ballena" },
      { tipo: "Empieza por B", texto: "Danza clásica que se baila de puntillas.", respuesta: "Ballet" }
    ],
    C: [
      { tipo: "Empieza por C", texto: "Órgano que bombea la sangre por todo el cuerpo.", respuesta: "Corazón" },
      { tipo: "Empieza por C", texto: "País sudamericano cuya capital es Santiago.", respuesta: "Chile" }
    ],
    D: [
      { tipo: "Empieza por D", texto: "Figura geométrica de diez lados.", respuesta: "Decágono" },
      { tipo: "Empieza por D", texto: "Dios griego del vino y las fiestas.", respuesta: "Dionisio" }
    ],
    E: [
      { tipo: "Empieza por E", texto: "País europeo cuya capital es Madrid.", respuesta: "España" },
      { tipo: "Empieza por E", texto: "Continente donde se encuentra España.", respuesta: "Europa" }
    ],
    F: [
      { tipo: "Empieza por F", texto: "Ciencia que estudia el movimiento, la energía y la materia.", respuesta: "Física" },
      { tipo: "Empieza por F", texto: "Nombre de las fiestas de Pamplona en las que corren los toros, San ____.", respuesta: "Fermín" }
    ],
    G: [
      { tipo: "Empieza por G", texto: "Ave doméstica de corral que canta al amanecer.", respuesta: "Gallo" },
      { tipo: "Empieza por G", texto: "País centroamericano cuya capital es Ciudad de Guatemala.", respuesta: "Guatemala" }
    ],
    H: [
      { tipo: "Empieza por H", texto: "País europeo cuya capital es Budapest.", respuesta: "Hungría" },
      { tipo: "Empieza por H", texto: "Físico británico famoso por sus estudios sobre los agujeros negros.", respuesta: "Hawking" }
    ],
    I: [
      { tipo: "Empieza por I", texto: "País europeo con forma de bota.", respuesta: "Italia" },
      { tipo: "Empieza por I", texto: "País escandinavo conocido por sus volcanes y géiseres.", respuesta: "Islandia" }
    ],
    J: [
      { tipo: "Empieza por J", texto: "Día de la semana entre el miércoles y el viernes.", respuesta: "Jueves" },
      { tipo: "Empieza por J", texto: "Planeta más grande del sistema solar.", respuesta: "Júpiter" }
    ],
    L: [
      { tipo: "Empieza por L", texto: "Felino de gran melena, conocido como el rey de la selva.", respuesta: "León" },
      { tipo: "Empieza por L", texto: "Diminuto país europeo situado entre Suiza y Austria.", respuesta: "Liechtenstein" }
    ],
    M: [
      { tipo: "Empieza por M", texto: "Capital de España.", respuesta: "Madrid" },
      { tipo: "Empieza por M", texto: "Planeta conocido como el planeta rojo.", respuesta: "Marte" }
    ],
    N: [
      { tipo: "Empieza por N", texto: "País escandinavo famoso por sus fiordos.", respuesta: "Noruega" },
      { tipo: "Empieza por N", texto: "Nombre que recibe la mitad superior del continente americano.", respuesta: "Norteamérica" }
    ],
    "Ñ": [
      { tipo: "Contiene la Ñ", texto: "Animal de ocho patas que teje una tela para cazar insectos.", respuesta: "Araña" },
      { tipo: "Contiene la Ñ", texto: "Fruta tropical cubierta de escamas, con una corona de hojas en la punta.", respuesta: "Piña" }
    ],
    O: [
      { tipo: "Empieza por O", texto: "Continente donde se encuentra Australia.", respuesta: "Oceanía" },
      { tipo: "Empieza por O", texto: "Instrumento musical de tubos, típico de las iglesias.", respuesta: "Órgano" }
    ],
    P: [
      { tipo: "Empieza por P", texto: "País sudamericano donde se encuentra Machu Picchu.", respuesta: "Perú" },
      { tipo: "Empieza por P", texto: "Ave que no vuela, de plumaje blanco y negro, típica de la Antártida.", respuesta: "Pingüino" }
    ],
    Q: [
      { tipo: "Empieza por Q", texto: "Alimento sólido elaborado a partir de leche cuajada.", respuesta: "Queso" },
      { tipo: "Empieza por Q", texto: "Producto lácteo que se vende en variedades como el manchego o el brie.", respuesta: "Queso" }
    ],
    R: [
      { tipo: "Empieza por R", texto: "Anfibio verde que vive cerca del agua y dice \"croac\".", respuesta: "Rana" },
      { tipo: "Empieza por R", texto: "País europeo cuya capital es Bucarest.", respuesta: "Rumanía" }
    ],
    S: [
      { tipo: "Empieza por S", texto: "Estrella que ilumina nuestro sistema solar.", respuesta: "Sol" },
      { tipo: "Empieza por S", texto: "País asiático con forma de lágrima, situado junto a la India.", respuesta: "Sri Lanka" }
    ],
    T: [
      { tipo: "Empieza por T", texto: "País situado entre Europa y Asia, cuya capital es Ankara.", respuesta: "Turquía" },
      { tipo: "Empieza por T", texto: "Reptil de caparazón duro, muy longevo, símbolo de lentitud.", respuesta: "Tortuga" }
    ],
    U: [
      { tipo: "Empieza por U", texto: "Institución donde se cursan estudios superiores tras el instituto.", respuesta: "Universidad" },
      { tipo: "Empieza por U", texto: "País sudamericano cuya capital es Montevideo.", respuesta: "Uruguay" }
    ],
    V: [
      { tipo: "Empieza por V", texto: "Pintor español autor de \"Las Meninas\".", respuesta: "Velázquez" },
      { tipo: "Empieza por V", texto: "Montaña que expulsa lava, cenizas y gases desde su interior.", respuesta: "Volcán" }
    ],
    X: [
      { tipo: "Empieza por X", texto: "Instrumento de percusión formado por láminas de madera que se golpean con baquetas.", respuesta: "Xilófono" },
      { tipo: "Contiene la X", texto: "Prueba médica que usa un tipo de rayos para fotografiar los huesos.", respuesta: "Rayos X" }
    ],
    Y: [
      { tipo: "Empieza por Y", texto: "Postre lácteo cremoso y fermentado, muy habitual en el desayuno.", respuesta: "Yogur" },
      { tipo: "Empieza por Y", texto: "Producto lácteo fermentado que también se usa para hacer salsas frías.", respuesta: "Yogur" }
    ],
    Z: [
      { tipo: "Empieza por Z", texto: "Mamífero astuto, de hocico puntiagudo y cola larga, protagonista de muchas fábulas.", respuesta: "Zorro" },
      { tipo: "Empieza por Z", texto: "Calzado que cubre y protege el pie, se usa a diario.", respuesta: "Zapato" }
    ]
  };

  // ---- Referencias al DOM ----
  var elPantallaInicio = document.getElementById("pantallaInicio");
  var elPantallaJuego = document.getElementById("pantallaJuego");
  var elPantallaFin = document.getElementById("pantallaFin");
  var elBtnJugar = document.getElementById("btnJugar");
  var elRosco = document.getElementById("rosco");
  var elContadorMini = document.getElementById("contadorMini");
  var elPreguntaTipo = document.getElementById("preguntaTipo");
  var elPreguntaTexto = document.getElementById("preguntaTexto");
  var elInputRespuesta = document.getElementById("inputRespuesta");
  var elRespuestaTexto = document.getElementById("respuestaTexto");
  var elBtnComprobar = document.getElementById("btnComprobar");
  var elBtnPasa = document.getElementById("btnPasa");
  var elBarraTiempo = document.getElementById("barraTiempo");
  var elTextoTiempo = document.getElementById("textoTiempo");
  var elMarcadorAciertos = document.getElementById("marcadorAciertos");
  var elMarcadorFallos = document.getElementById("marcadorFallos");
  var elFinTitulo = document.getElementById("finTitulo");
  var elFinResumen = document.getElementById("finResumen");
  var elRoscoFinal = document.getElementById("roscoFinal");
  var elBtnReiniciar = document.getElementById("btnReiniciar");

  // ---- Estado del juego ----
  var estadoLetras = [];
  var colaTurnos = [];
  var punteroTurno = 0;
  var segundosRestantes = CONFIG.DURACION_SEGUNDOS;
  var idIntervalo = null;
  var celdasDom = [];
  var enTransicion = false;

  function elegirPreguntaAleatoria(letra){
    var opciones = BANCO_PREGUNTAS[letra];
    return opciones[Math.floor(Math.random() * opciones.length)];
  }

  function normalizar(texto){
    return texto
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim()
      .replace(/\s+/g, " ");
  }

  function vibrar(patron){
    if (navigator.vibrate) { try { navigator.vibrate(patron); } catch (e) { /* no soportado */ } }
  }

  function construirRosco(){
    elRosco.querySelectorAll(".celda").forEach(function(c){ c.remove(); });
    celdasDom = [];
    var n = CONFIG.LETRAS_ROSCO.length;
    for (var i = 0; i < n; i++){
      var angulo = (i / n) * 2 * Math.PI - Math.PI / 2;
      var x = 50 + CONFIG.RADIO_PORCENTAJE * Math.cos(angulo);
      var y = 50 + CONFIG.RADIO_PORCENTAJE * Math.sin(angulo);
      var celda = document.createElement("div");
      celda.className = "celda";
      celda.style.left = x.toFixed(3) + "%";
      celda.style.top = y.toFixed(3) + "%";
      celda.style.width = CONFIG.TAMANO_CELDA_PORCENTAJE + "%";
      celda.textContent = CONFIG.LETRAS_ROSCO[i];
      elRosco.appendChild(celda);
      celdasDom.push(celda);
    }
  }

  function iniciarPartida(){
    estadoLetras = CONFIG.LETRAS_ROSCO.map(function(letra){
      var p = elegirPreguntaAleatoria(letra);
      return { letra: letra, tipo: p.tipo, texto: p.texto, respuesta: p.respuesta, estado: "pendiente", pasada: false };
    });
    colaTurnos = estadoLetras.map(function(_, i){ return i; });
    punteroTurno = 0;
    segundosRestantes = CONFIG.DURACION_SEGUNDOS;
    enTransicion = false;

    construirRosco();
    actualizarMarcador();
    actualizarBarraTiempo();

    elPantallaInicio.classList.add("oculto");
    elPantallaFin.classList.add("oculto");
    elPantallaJuego.classList.remove("oculto");

    mostrarTurnoActual();

    if (idIntervalo) clearInterval(idIntervalo);
    idIntervalo = setInterval(tick, 1000);
  }

  function indiceActual(){
    return colaTurnos[punteroTurno % colaTurnos.length];
  }

  function mostrarTurnoActual(){
    if (colaTurnos.length === 0){ finalizarPartida("completado"); return; }

    var idx = indiceActual();
    var item = estadoLetras[idx];

    celdasDom.forEach(function(c){ c.classList.remove("activa"); });
    celdasDom[idx].classList.add("activa");

    elContadorMini.textContent = "Quedan " + colaTurnos.length + " de 25";
    elPreguntaTipo.textContent = item.tipo;
    elPreguntaTexto.textContent = item.texto;

    elInputRespuesta.value = "";
    elInputRespuesta.disabled = false;
    elRespuestaTexto.classList.add("oculto");
    elRespuestaTexto.classList.remove("es-acierto", "es-fallo");
    elBtnComprobar.disabled = false;
    elBtnPasa.disabled = false;
  }

  function pasarPalabra(){
    if (enTransicion) return;
    if (colaTurnos.length <= 1) return;
    var idx = indiceActual();
    estadoLetras[idx].pasada = true;
    celdasDom[idx].classList.add("pasada");
    colaTurnos.splice(punteroTurno, 1);
    colaTurnos.push(idx);
    if (punteroTurno >= colaTurnos.length) punteroTurno = 0;
    mostrarTurnoActual();
  }

  function comprobarRespuesta(){
    if (enTransicion) return;
    var valor = elInputRespuesta.value;
    if (valor.trim() === "") return;

    var idx = indiceActual();
    var item = estadoLetras[idx];
    var acierto = normalizar(valor) === normalizar(item.respuesta);

    enTransicion = true;
    elInputRespuesta.disabled = true;
    elBtnComprobar.disabled = true;
    elBtnPasa.disabled = true;

    elRespuestaTexto.textContent = acierto ? ("¡Correcto! " + item.respuesta) : ("Era: " + item.respuesta);
    elRespuestaTexto.classList.remove("oculto");
    elRespuestaTexto.classList.add(acierto ? "es-acierto" : "es-fallo");

    elRosco.classList.remove("flash-correcta", "flash-incorrecta");
    void elRosco.offsetWidth;
    elRosco.classList.add(acierto ? "flash-correcta" : "flash-incorrecta");
    vibrar(acierto ? 45 : [40, 40, 40]);

    setTimeout(function(){
      enTransicion = false;
      resolverTurno(acierto);
    }, CONFIG.RETARDO_TRANSICION_MS);
  }

  function resolverTurno(acierto){
    var idx = indiceActual();
    estadoLetras[idx].estado = acierto ? "correcta" : "incorrecta";
    celdasDom[idx].classList.remove("activa", "pasada");
    celdasDom[idx].classList.add(acierto ? "correcta" : "incorrecta");

    colaTurnos.splice(punteroTurno, 1);
    if (colaTurnos.length > 0 && punteroTurno >= colaTurnos.length) punteroTurno = 0;

    actualizarMarcador();
    mostrarTurnoActual();
  }

  function actualizarMarcador(){
    var aciertos = estadoLetras.filter(function(i){ return i.estado === "correcta"; }).length;
    var fallos = estadoLetras.filter(function(i){ return i.estado === "incorrecta"; }).length;
    elMarcadorAciertos.textContent = "✓ " + aciertos;
    elMarcadorFallos.textContent = "✗ " + fallos;
  }

  function actualizarBarraTiempo(){
    var porcentaje = Math.max(0, (segundosRestantes / CONFIG.DURACION_SEGUNDOS) * 100);
    elBarraTiempo.style.width = porcentaje + "%";
    if (segundosRestantes <= CONFIG.UMBRAL_TIEMPO_URGENTE){
      elBarraTiempo.style.background = "#FFD3D0";
    } else {
      elBarraTiempo.style.background = "var(--blanco)";
    }
    var m = Math.floor(segundosRestantes / 60);
    var s = segundosRestantes % 60;
    elTextoTiempo.textContent = (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function tick(){
    segundosRestantes--;
    actualizarBarraTiempo();
    if (segundosRestantes <= 0){
      finalizarPartida("tiempo");
    }
  }

  function finalizarPartida(motivo){
    clearInterval(idIntervalo);
    idIntervalo = null;

    estadoLetras.forEach(function(item, idx){
      if (item.estado === "pendiente"){
        item.estado = "sin-responder";
        celdasDom[idx].classList.remove("activa", "pasada");
        celdasDom[idx].classList.add("sin-responder");
      }
    });

    var aciertos = estadoLetras.filter(function(i){ return i.estado === "correcta"; }).length;
    var fallos = estadoLetras.filter(function(i){ return i.estado === "incorrecta"; }).length;
    var sinResponder = estadoLetras.filter(function(i){ return i.estado === "sin-responder"; }).length;

    elFinTitulo.textContent = motivo === "tiempo" ? "¡Se acabó el tiempo!" : "¡Rosco completado!";

    var mensajeNivel;
    if (aciertos === 25) mensajeNivel = "¡Rosco perfecto! 🏆";
    else if (aciertos >= 20) mensajeNivel = "¡Nivel crack! 🔥";
    else if (aciertos >= 15) mensajeNivel = "Muy buena partida 👏";
    else if (aciertos >= 10) mensajeNivel = "Nada mal 💪";
    else mensajeNivel = "A seguir practicando 📚";

    elFinResumen.textContent = mensajeNivel + " — Aciertos: " + aciertos + " · Fallos: " + fallos + (sinResponder > 0 ? " · Sin responder: " + sinResponder : "");

    construirRoscoFinal();

    elPantallaJuego.classList.add("oculto");
    elPantallaFin.classList.remove("oculto");
  }

  function construirRoscoFinal(){
    elRoscoFinal.innerHTML = "";
    var n = CONFIG.LETRAS_ROSCO.length;
    for (var i = 0; i < n; i++){
      var angulo = (i / n) * 2 * Math.PI - Math.PI / 2;
      var x = 50 + CONFIG.RADIO_PORCENTAJE * Math.cos(angulo);
      var y = 50 + CONFIG.RADIO_PORCENTAJE * Math.sin(angulo);
      var celda = document.createElement("div");
      var item = estadoLetras[i];
      celda.className = "celda " + item.estado;
      celda.style.left = x.toFixed(3) + "%";
      celda.style.top = y.toFixed(3) + "%";
      celda.style.width = CONFIG.TAMANO_CELDA_PORCENTAJE + "%";
      celda.textContent = item.letra;
      elRoscoFinal.appendChild(celda);
    }
  }

  // ---- Eventos ----
  elBtnJugar.addEventListener("click", iniciarPartida);
  elBtnPasa.addEventListener("click", pasarPalabra);
  elBtnComprobar.addEventListener("click", comprobarRespuesta);
  elBtnReiniciar.addEventListener("click", iniciarPartida);
  elInputRespuesta.addEventListener("keydown", function(e){
    if (e.key === "Enter"){ e.preventDefault(); comprobarRespuesta(); }
  });

})();
</script>
</body>
</html>
