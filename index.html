<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pasapalabra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="preguntas.js"></script>
<style>
  :root{
    --azul-claro: #5FB3F6;
    --azul-medio: #2E7FE0;
    --azul-oscuro: #123E8C;
    --azul-profundo: #0B2C66;
    --azul-celda: #2E74DA;
    --azul-celda-borde: rgba(255,255,255,0.45);
    --azul-pasada: #BFE0FF;
    --blanco: #FFFFFF;
    --blanco-tenue: rgba(255,255,255,0.78);
    --verde-activa: #3CC583;
    --verde-correcta: #2FAF6E;
    --rojo-incorrecta: #E5504A;
    --gris-neutro: #7C93B8;
    --fuente-display: "Baloo 2", sans-serif;
    --fuente-cuerpo: "Space Grotesk", sans-serif;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0; min-height:100%;
    min-height: 100dvh;
    background: radial-gradient(circle at 50% 0%, var(--azul-claro) 0%, var(--azul-medio) 45%, var(--azul-oscuro) 100%);
    color: var(--blanco);
    font-family: var(--fuente-cuerpo);
  }

  .escenario{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 20px 18px 40px;
    display: flex;
    flex-direction: column;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 14px;
  }

  h1{
    font-family: var(--fuente-display);
    font-weight: 800;
    font-size: 26px;
    margin:0;
    letter-spacing: 0.3px;
    color: var(--blanco);
  }

  .marcador{
    display:flex; gap:10px;
    font-size: 13px;
    font-weight: 700;
  }
  .marcador span{
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .marcador .aciertos{ color: #DFFFEE; }
  .marcador .fallos{ color: #FFE1DE; }

  .boton-sonido{
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.16);
    color: var(--blanco);
    font-size: 15px;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    touch-action: manipulation;
  }
  .boton-sonido:active{ transform: scale(0.94); }

  .tiempo-transcurrido{
    text-align:center;
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    font-size: 13px;
    color: var(--blanco-tenue);
    margin-bottom: 10px;
  }

  .pantalla{ flex:1; display:flex; flex-direction:column; }
  .oculto{ display:none !important; }

  #pantallaJuego{
    align-items:center;
    justify-content:flex-start;
    padding-top: 2vh;
  }

  #pantallaInicio{
    align-items:center;
    justify-content:center;
    text-align:center;
    gap: 26px;
    padding: 10px 6px 40px;
  }
  #pantallaInicio p{
    color: var(--blanco-tenue);
    font-size: 15px;
    line-height: 1.5;
    max-width: 300px;
    margin: 0;
  }

  .boton-redondo{
    font-family: var(--fuente-display);
    font-weight: 700;
    font-size: 19px;
    width: 148px;
    height: 148px;
    border-radius: 50%;
    border: none;
    background: var(--blanco);
    color: var(--azul-oscuro);
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    box-shadow: 0 14px 30px -8px rgba(11,44,102,0.55);
  }
  .boton-redondo:active{ transform: scale(0.96); }

  /* ---- ROSCO ---- */
  .rosco{
    position: relative;
    width: min(92vw, 400px);
    aspect-ratio: 1;
    margin: 6px auto 22px;
    border-radius: 50%;
  }
  .rosco::before{
    content:'';
    position:absolute;
    inset: -6%;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0deg, rgba(255,255,255,0.18) 55deg, transparent 130deg, transparent 360deg);
    animation: girar-foco 14s linear infinite;
    z-index: 0;
  }
  @keyframes girar-foco{ to{ transform: rotate(360deg); } }

  .centro-juego{
    position:absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: min(72%, 290px);
    text-align:center;
    z-index: 2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 7px;
  }
  .badge-tipo{
    background: var(--blanco);
    color: var(--azul-oscuro);
    font-weight: 700;
    font-size: 10.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .pregunta-texto{
    margin:0;
    font-size: clamp(11px, 3.2vw, 14px);
    font-weight: 700;
    line-height: 1.3;
    color: var(--blanco);
  }

  .input-respuesta{
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.55);
    color: var(--blanco);
    font-family: var(--fuente-cuerpo);
    font-weight: 600;
    font-size: 12.5px;
    text-align: center;
    padding: 4px 3px;
    outline: none;
  }
  .input-respuesta::placeholder{ color: rgba(255,255,255,0.6); }
  .input-respuesta:disabled{ opacity: 0.7; }

  .respuesta-texto{
    margin:0;
    font-size: 12px;
    font-weight: 700;
    color: var(--azul-oscuro);
    background: rgba(255,255,255,0.94);
    border-radius: 10px;
    padding: 5px 9px;
  }
  .respuesta-texto.es-fallo{ background: rgba(255,255,255,0.94); color: var(--rojo-incorrecta); }
  .respuesta-texto.es-acierto{ background: rgba(255,255,255,0.94); color: var(--verde-correcta); }

  .botones-icono{
    display:flex; gap: 10px;
    align-items:center;
    justify-content:center;
  }
  .boton-icono{
    width: 66px;
    height: 34px;
    border-radius: 999px;
    border: none;
    background: var(--azul-oscuro);
    color: var(--blanco);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 14px -4px rgba(11,44,102,0.6);
  }
  .boton-icono:active{ transform: scale(0.95); }
  .boton-icono:disabled{ opacity: 0.5; }

  .celda{
    position:absolute;
    width: 8.6%;
    aspect-ratio: 1;
    transform: translate(-50%,-50%);
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-weight: 700;
    font-size: 12px;
    background: var(--azul-celda);
    color: var(--blanco);
    border: none;
    box-shadow: 0 2px 4px rgba(6,20,50,0.35), inset 0 -3px 0 rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.18);
    z-index: 1;
    transition: all 0.35s ease;
  }
  .celda.activa{
    background: var(--blanco);
    color: var(--azul-oscuro);
    transform: translate(-50%,-50%) scale(1.28);
    box-shadow: 0 0 0 6px rgba(255,255,255,0.3);
  }
  .celda.correcta{ background: var(--verde-correcta); color:#fff; }
  .celda.incorrecta{ background: var(--rojo-incorrecta); color:#fff; }
  .celda.pasada{ background: var(--azul-celda); color: var(--blanco); border: 2px dashed var(--blanco); box-shadow: none; }

  .flash-correcta .centro-juego{ animation: destello-verde 0.5s ease; }
  .flash-incorrecta .centro-juego{ animation: destello-rojo 0.5s ease; }
  @keyframes destello-verde{ 0%{ filter: drop-shadow(0 0 14px rgba(60,197,131,0.9)); } 100%{ filter: none; } }
  @keyframes destello-rojo{ 0%{ filter: drop-shadow(0 0 14px rgba(229,80,74,0.9)); } 100%{ filter: none; } }

  /* ---- FIN ---- */
  #pantallaFin{
    align-items:center;
    text-align:center;
    justify-content:center;
    gap: 14px;
  }
  #finResumen{
    color: var(--blanco);
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .rosco-final{
    position: relative;
    width: min(72vw, 300px);
    aspect-ratio: 1;
    margin: 4px auto 18px;
  }
  .rosco-final .celda{ cursor:default; }

  @media (prefers-reduced-motion: reduce){
    .rosco::before{ animation: none; }
  }
</style>
</head>
<body>
<div class="escenario">

  <header>
    <h1>Pasapalabra</h1>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="marcador">
        <span class="aciertos" id="marcadorAciertos">✓ 0</span>
        <span class="fallos" id="marcadorFallos">✗ 0</span>
      </div>
      <button class="boton-sonido" id="btnSonido" title="Silenciar/activar sonido">🔊</button>
    </div>
  </header>

  <audio id="musicaFondo" src="musica.mp3" loop preload="auto"></audio>
  <audio id="sonidoAcierto" src="acierto.mp3" preload="auto"></audio>
  <audio id="sonidoFallo" src="fallo.mp3" preload="auto"></audio>

  <div class="tiempo-transcurrido" id="tiempoTranscurrido">⏱ 00:00</div>

  <div class="pantalla" id="pantallaInicio">
    <button class="boton-redondo" id="btnJugar">Generar rosco</button>
  </div>

  <div class="pantalla oculto" id="pantallaJuego">
    <div class="rosco" id="rosco">
      <div class="centro-juego" id="centroJuego">
        <div class="badge-tipo" id="preguntaTipo">Empieza por A</div>
        <p class="pregunta-texto" id="preguntaTexto"></p>

        <input type="text" class="input-respuesta" id="inputRespuesta" placeholder="Escribe aquí tu respuesta" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">

        <p class="respuesta-texto oculto" id="respuestaTexto"></p>

        <div class="botones-icono" id="botonesIcono">
          <button class="boton-icono" id="btnComprobar" title="Comprobar">✓</button>
          <button class="boton-icono" id="btnPasa" title="Pasapalabra">»</button>
        </div>
      </div>
    </div>
  </div>

  <div class="pantalla oculto" id="pantallaFin">
    <p id="finResumen"></p>
    <div class="rosco-final" id="roscoFinal"></div>
    <button class="boton-redondo" id="btnReiniciar">Generar rosco</button>
  </div>

</div>

<script>
(function(){
  "use strict";

  var CONFIG = {
    RADIO_PORCENTAJE: 43,
    TAMANO_CELDA_PORCENTAJE: 8.6,
    RETARDO_TRANSICION_MS: 1000,
    VOLUMEN_MUSICA: 0.35,
    VOLUMEN_MUSICA_DUCKING: 0.08,
    DURACION_DUCKING_MS: 900,
    FRECUENCIA_PASAPALABRA_INICIO: 4200,
    FRECUENCIA_PASAPALABRA_FIN: 700,
    DURACION_PASAPALABRA: 0.32,
    VOLUMEN_PASAPALABRA: 0.65,
    Q_PASAPALABRA: 1.3,
    LETRAS_ROSCO: ["A","B","C","D","E","F","G","H","I","J","L","M","N","Ñ","O","P","Q","R","S","T","U","V","X","Y","Z"]
  };

  // El banco de preguntas (BANCO_PREGUNTAS) llega desde preguntas.js,
  // cargado antes que este script.

  var LETRAS_TIPO_CONTIENE = ["Ñ"];

  function tipoParaLetra(letra){
    return LETRAS_TIPO_CONTIENE.indexOf(letra) !== -1 ? "Contiene la " + letra : "Empieza por " + letra;
  }

  // ---- Referencias al DOM ----
  var elPantallaInicio = document.getElementById("pantallaInicio");
  var elPantallaJuego = document.getElementById("pantallaJuego");
  var elPantallaFin = document.getElementById("pantallaFin");
  var elBtnJugar = document.getElementById("btnJugar");
  var elRosco = document.getElementById("rosco");
  var elPreguntaTipo = document.getElementById("preguntaTipo");
  var elPreguntaTexto = document.getElementById("preguntaTexto");
  var elInputRespuesta = document.getElementById("inputRespuesta");
  var elRespuestaTexto = document.getElementById("respuestaTexto");
  var elBtnComprobar = document.getElementById("btnComprobar");
  var elBtnPasa = document.getElementById("btnPasa");
  var elTiempoTranscurrido = document.getElementById("tiempoTranscurrido");
  var elMarcadorAciertos = document.getElementById("marcadorAciertos");
  var elMarcadorFallos = document.getElementById("marcadorFallos");
  var elFinResumen = document.getElementById("finResumen");
  var elRoscoFinal = document.getElementById("roscoFinal");
  var elBtnReiniciar = document.getElementById("btnReiniciar");
  var elMusicaFondo = document.getElementById("musicaFondo");
  var elBtnSonido = document.getElementById("btnSonido");
  var elSonidoAcierto = document.getElementById("sonidoAcierto");
  var elSonidoFallo = document.getElementById("sonidoFallo");

  // ---- Estado del juego ----
  var estadoLetras = [];
  var colaTurnos = [];
  var punteroTurno = 0;
  var segundosTranscurridos = 0;
  var idIntervalo = null;
  var celdasDom = [];
  var enTransicion = false;
  var sonidoActivado = true;
  var contextoAudio = null;
  var idTimeoutDuckMusica = null;

  function agacharMusicaTemporalmente(){
    if (elMusicaFondo.paused) return;
    elMusicaFondo.volume = CONFIG.VOLUMEN_MUSICA_DUCKING;
    clearTimeout(idTimeoutDuckMusica);
    idTimeoutDuckMusica = setTimeout(function(){
      elMusicaFondo.volume = CONFIG.VOLUMEN_MUSICA;
    }, CONFIG.DURACION_DUCKING_MS);
  }

  function obtenerContextoAudio(){
    var ClaseAudioContext = window.AudioContext || window.webkitAudioContext;
    if (!ClaseAudioContext) return null;
    if (!contextoAudio) contextoAudio = new ClaseAudioContext();
    if (contextoAudio.state === "suspended") contextoAudio.resume();
    return contextoAudio;
  }

  function reproducirSonidoAcierto(){
    if (!sonidoActivado) return;
    agacharMusicaTemporalmente();
    elSonidoAcierto.currentTime = 0;
    elSonidoAcierto.play().catch(function(){ /* sin interacción previa del usuario */ });
  }

  function reproducirSonidoError(){
    if (!sonidoActivado) return;
    agacharMusicaTemporalmente();
    elSonidoFallo.currentTime = 0;
    elSonidoFallo.play().catch(function(){ /* sin interacción previa del usuario */ });
  }

  function reproducirSonidoPasapalabra(){
    if (!sonidoActivado) return;
    agacharMusicaTemporalmente();
    var ctx = obtenerContextoAudio();
    if (!ctx) return;
    var inicio = ctx.currentTime;
    var duracion = CONFIG.DURACION_PASAPALABRA;

    // Ruido blanco: es la base de un sonido de "escobazo" o "shhh".
    var muestras = Math.floor(ctx.sampleRate * duracion);
    var buffer = ctx.createBuffer(1, muestras, ctx.sampleRate);
    var datos = buffer.getChannelData(0);
    for (var i = 0; i < muestras; i++){
      datos[i] = Math.random() * 2 - 1;
    }
    var fuenteRuido = ctx.createBufferSource();
    fuenteRuido.buffer = buffer;

    // Filtro de paso de banda que barre de agudo a grave: da la sensación de barrido.
    var filtro = ctx.createBiquadFilter();
    filtro.type = "bandpass";
    filtro.Q.value = CONFIG.Q_PASAPALABRA;
    filtro.frequency.setValueAtTime(CONFIG.FRECUENCIA_PASAPALABRA_INICIO, inicio);
    filtro.frequency.exponentialRampToValueAtTime(CONFIG.FRECUENCIA_PASAPALABRA_FIN, inicio + duracion);

    // Envolvente de volumen en forma de "swell": entra y sale suave, como un barrido.
    var ganancia = ctx.createGain();
    ganancia.gain.setValueAtTime(0.0001, inicio);
    ganancia.gain.exponentialRampToValueAtTime(CONFIG.VOLUMEN_PASAPALABRA, inicio + duracion * 0.3);
    ganancia.gain.exponentialRampToValueAtTime(0.0001, inicio + duracion);

    fuenteRuido.connect(filtro);
    filtro.connect(ganancia);
    ganancia.connect(ctx.destination);

    fuenteRuido.start(inicio);
    fuenteRuido.stop(inicio + duracion);
  }

  function activarAudioTrasGesto(){
    if (sonidoActivado){
      elMusicaFondo.volume = CONFIG.VOLUMEN_MUSICA;
      elMusicaFondo.play().catch(function(error){ console.error("No se pudo reproducir musica.mp3:", error); });
    }
  }

  function alternarSonido(){
    sonidoActivado = !sonidoActivado;
    elBtnSonido.textContent = sonidoActivado ? "🔊" : "🔇";
    if (sonidoActivado){
      elMusicaFondo.play().catch(function(){ /* musica.mp3 no disponible todavía */ });
    } else {
      elMusicaFondo.pause();
    }
  }

  // Cada pregunta en BANCO_PREGUNTAS es un par [definicion, palabra].
  // Elegimos una al azar por letra en cada partida.
  function elegirPreguntaAleatoria(letra){
    var opciones = BANCO_PREGUNTAS[letra];
    var par = opciones[Math.floor(Math.random() * opciones.length)];
    return { texto: par[0], respuesta: par[1] };
  }

  function normalizar(texto){
    return texto
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim()
      .replace(/\s+/g, " ");
  }

  function vibrar(patron){
    if (navigator.vibrate) { try { navigator.vibrate(patron); } catch (e) { /* no soportado */ } }
  }

  function construirRosco(){
    elRosco.querySelectorAll(".celda").forEach(function(c){ c.remove(); });
    celdasDom = [];
    var n = CONFIG.LETRAS_ROSCO.length;
    for (var i = 0; i < n; i++){
      var angulo = (i / n) * 2 * Math.PI - Math.PI / 2;
      var x = 50 + CONFIG.RADIO_PORCENTAJE * Math.cos(angulo);
      var y = 50 + CONFIG.RADIO_PORCENTAJE * Math.sin(angulo);
      var celda = document.createElement("div");
      celda.className = "celda";
      celda.style.left = x.toFixed(3) + "%";
      celda.style.top = y.toFixed(3) + "%";
      celda.style.width = CONFIG.TAMANO_CELDA_PORCENTAJE + "%";
      celda.textContent = CONFIG.LETRAS_ROSCO[i];
      elRosco.appendChild(celda);
      celdasDom.push(celda);
    }
  }

  function iniciarPartida(){
    estadoLetras = CONFIG.LETRAS_ROSCO.map(function(letra){
      var p = elegirPreguntaAleatoria(letra);
      return { letra: letra, tipo: tipoParaLetra(letra), texto: p.texto, respuesta: p.respuesta, estado: "pendiente", pasada: false };
    });
    colaTurnos = estadoLetras.map(function(_, i){ return i; });
    punteroTurno = 0;
    segundosTranscurridos = 0;
    enTransicion = false;

    construirRosco();
    actualizarMarcador();
    actualizarTiempoTranscurrido();

    elPantallaInicio.classList.add("oculto");
    elPantallaFin.classList.add("oculto");
    elPantallaJuego.classList.remove("oculto");

    mostrarTurnoActual();

    if (idIntervalo) clearInterval(idIntervalo);
    idIntervalo = setInterval(tick, 1000);
  }

  function indiceActual(){
    return colaTurnos[punteroTurno % colaTurnos.length];
  }

  function mostrarTurnoActual(){
    if (colaTurnos.length === 0){ finalizarPartida(); return; }

    var idx = indiceActual();
    var item = estadoLetras[idx];

    celdasDom.forEach(function(c){ c.classList.remove("activa"); });
    celdasDom[idx].classList.add("activa");

    elPreguntaTipo.textContent = item.tipo;
    elPreguntaTexto.textContent = item.texto;

    elInputRespuesta.value = "";
    elInputRespuesta.disabled = false;
    elRespuestaTexto.classList.add("oculto");
    elRespuestaTexto.classList.remove("es-acierto", "es-fallo");
    elBtnComprobar.disabled = false;
    elBtnPasa.disabled = false;
    elInputRespuesta.focus();
  }

  function pasarPalabra(){
    if (enTransicion) return;
    if (colaTurnos.length <= 1) return;
    reproducirSonidoPasapalabra();
    var idx = indiceActual();
    estadoLetras[idx].pasada = true;
    celdasDom[idx].classList.add("pasada");
    colaTurnos.splice(punteroTurno, 1);
    colaTurnos.push(idx);
    if (punteroTurno >= colaTurnos.length) punteroTurno = 0;
    mostrarTurnoActual();
  }

  function comprobarRespuesta(){
    if (enTransicion) return;
    var valor = elInputRespuesta.value;
    if (valor.trim() === "") return;

    var idx = indiceActual();
    var item = estadoLetras[idx];
    var acierto = normalizar(valor) === normalizar(item.respuesta);

    enTransicion = true;
    elInputRespuesta.disabled = true;
    elBtnComprobar.disabled = true;
    elBtnPasa.disabled = true;

    elRespuestaTexto.textContent = acierto ? ("¡Correcto! " + item.respuesta) : ("Era: " + item.respuesta);
    elRespuestaTexto.classList.remove("oculto");
    elRespuestaTexto.classList.add(acierto ? "es-acierto" : "es-fallo");

    elRosco.classList.remove("flash-correcta", "flash-incorrecta");
    void elRosco.offsetWidth;
    elRosco.classList.add(acierto ? "flash-correcta" : "flash-incorrecta");
    vibrar(acierto ? 45 : [40, 40, 40]);
    if (acierto) reproducirSonidoAcierto(); else reproducirSonidoError();

    setTimeout(function(){
      enTransicion = false;
      resolverTurno(acierto);
    }, CONFIG.RETARDO_TRANSICION_MS);
  }

  function resolverTurno(acierto){
    var idx = indiceActual();
    estadoLetras[idx].estado = acierto ? "correcta" : "incorrecta";
    celdasDom[idx].classList.remove("activa", "pasada");
    celdasDom[idx].classList.add(acierto ? "correcta" : "incorrecta");

    colaTurnos.splice(punteroTurno, 1);
    if (colaTurnos.length > 0 && punteroTurno >= colaTurnos.length) punteroTurno = 0;

    actualizarMarcador();
    mostrarTurnoActual();
  }

  function actualizarMarcador(){
    var aciertos = estadoLetras.filter(function(i){ return i.estado === "correcta"; }).length;
    var fallos = estadoLetras.filter(function(i){ return i.estado === "incorrecta"; }).length;
    elMarcadorAciertos.textContent = "✓ " + aciertos;
    elMarcadorFallos.textContent = "✗ " + fallos;
  }

  function actualizarTiempoTranscurrido(){
    var m = Math.floor(segundosTranscurridos / 60);
    var s = segundosTranscurridos % 60;
    elTiempoTranscurrido.textContent = "⏱ " + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function tick(){
    segundosTranscurridos++;
    actualizarTiempoTranscurrido();
  }

  function finalizarPartida(){
    clearInterval(idIntervalo);
    idIntervalo = null;

    var aciertos = estadoLetras.filter(function(i){ return i.estado === "correcta"; }).length;
    var fallos = estadoLetras.filter(function(i){ return i.estado === "incorrecta"; }).length;
    var m = Math.floor(segundosTranscurridos / 60);
    var s = segundosTranscurridos % 60;
    var tiempoFormateado = (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;

    elFinResumen.textContent = "Aciertos: " + aciertos + " · Fallos: " + fallos + " · Tiempo: " + tiempoFormateado;

    construirRoscoFinal();

    elPantallaJuego.classList.add("oculto");
    elPantallaFin.classList.remove("oculto");
  }

  function construirRoscoFinal(){
    elRoscoFinal.innerHTML = "";
    var n = CONFIG.LETRAS_ROSCO.length;
    for (var i = 0; i < n; i++){
      var angulo = (i / n) * 2 * Math.PI - Math.PI / 2;
      var x = 50 + CONFIG.RADIO_PORCENTAJE * Math.cos(angulo);
      var y = 50 + CONFIG.RADIO_PORCENTAJE * Math.sin(angulo);
      var celda = document.createElement("div");
      var item = estadoLetras[i];
      celda.className = "celda " + item.estado;
      celda.style.left = x.toFixed(3) + "%";
      celda.style.top = y.toFixed(3) + "%";
      celda.style.width = CONFIG.TAMANO_CELDA_PORCENTAJE + "%";
      celda.textContent = item.letra;
      elRoscoFinal.appendChild(celda);
    }
  }

  // ---- Eventos ----
  elBtnJugar.addEventListener("click", function(){ activarAudioTrasGesto(); iniciarPartida(); });
  elBtnPasa.addEventListener("click", pasarPalabra);
  elBtnComprobar.addEventListener("click", comprobarRespuesta);
  elBtnReiniciar.addEventListener("click", function(){ activarAudioTrasGesto(); iniciarPartida(); });
  elBtnSonido.addEventListener("click", alternarSonido);
  elInputRespuesta.addEventListener("keydown", function(e){
    if (e.key === "Enter"){ e.preventDefault(); comprobarRespuesta(); }
  });

})();
</script>
</body>
</html>
